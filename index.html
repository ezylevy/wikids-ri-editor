<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wikids RI Editor v2</title>
<style>
:root {
  --bg: #f4f6fa; --white: #ffffff; --border: #e2e8f0;
  --text: #1a202c; --muted: #718096; --accent: #3b82f6;
  --changed: #fffbeb; --changed-border: #f59e0b;
  --issue: #fee2e2; --issue-border: #ef4444;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

.header { background: #1a202c; color: white; padding: 14px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.3); flex-wrap: wrap; }
.header h1 { font-size: 1.1rem; font-weight: 700; }
.header .stats { font-size: 0.8rem; color: #94a3b8; }
.header .stats strong { color: #f59e0b; }
.hbtn { padding: 7px 16px; border-radius: 6px; border: none; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: opacity .15s; }
.hbtn:hover { opacity: .85; }
.hbtn.export  { background: #10b981; color: white; margin-left: auto; }
.hbtn.analyze { background: #3b82f6; color: white; }

.controls { background: var(--white); border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.controls input[type=text] { padding: 6px 11px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.85rem; width: 220px; outline: none; }
.controls input:focus { border-color: var(--accent); }
.controls select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.85rem; outline: none; }
.controls label { font-size: 0.82rem; color: var(--muted); display: flex; align-items: center; gap: 5px; }
.badge-count { background: #ef4444; color: white; border-radius: 10px; padding: 1px 7px; font-size: 0.75rem; font-weight: 700; }

.legend { display: flex; gap: 12px; flex-wrap: wrap; margin: 10px 24px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; color: var(--muted); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

.tbl-wrap { padding: 12px 24px; }
table { width: 100%; border-collapse: separate; border-spacing: 0 4px; }
thead th { background: #2d3748; color: #e2e8f0; padding: 10px 12px; font-size: 0.78rem; font-weight: 600; text-align: left; }
thead th:first-child { border-radius: 6px 0 0 6px; }
thead th:last-child  { border-radius: 0 6px 6px 0; }

.entry-row { background: var(--white); border-radius: 8px; transition: box-shadow .15s; }
.entry-row:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.entry-row td { padding: 8px 12px; vertical-align: top; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.entry-row td:first-child { border-left: 1px solid var(--border); border-radius: 6px 0 0 6px; }
.entry-row td:last-child  { border-right: 1px solid var(--border); border-radius: 0 6px 6px 0; }
.entry-row.hidden { display: none; }

.entry-id   { color: var(--muted); font-size: 0.75rem; width: 36px; }
.entry-name { font-weight: 700; font-size: 0.92rem; }
.cat-chip   { display: inline-block; padding: 2px 7px; border-radius: 10px; color: white; font-size: 0.68rem; font-weight: 700; margin-top: 3px; }

.ri-cell { min-width: 130px; max-width: 180px; cursor: pointer; border-radius: 6px; padding: 6px 8px !important; transition: background .12s; }
.ri-cell:hover .ri-inner { outline: 2px solid var(--accent); border-radius: 4px; }
.ri-cell.empty-slot { cursor: default; }
.ri-cell.empty-slot:hover .ri-inner { outline: none; }
.ri-inner { position: relative; }
.ri-term  { font-weight: 600; font-size: 0.85rem; padding: 3px 6px; border-radius: 4px; color: white; display: inline-block; }
.ri-term.empty { background: #e5e7eb !important; color: #9ca3af; font-style: italic; font-weight: 400; }
.ri-reason { font-size: 0.71rem; color: var(--muted); margin-top: 4px; line-height: 1.3; font-style: italic; }
.same-cat-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #10b981; margin-left: 5px; vertical-align: middle; }
.ri-cell.is-changed { background: var(--changed); }
.ri-cell.is-changed .ri-inner { outline: 2px solid var(--changed-border); border-radius: 4px; }
.orig-term { font-size: 0.68rem; color: #9ca3af; text-decoration: line-through; margin-top: 2px; }
.entry-row.has-issue { border-left: 3px solid #ef4444; }
.entry-row.has-issue td:first-child { border-left: none; }

.edit-popup {
  display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  background: white; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,.2);
  padding: 20px; width: 400px; z-index: 200;
}
.edit-popup h3 { font-size: 0.95rem; margin-bottom: 12px; }
.edit-popup label { font-size: 0.8rem; color: var(--muted); display: block; margin-bottom: 3px; }
.edit-popup input[type=text], .edit-popup textarea {
  width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px;
  font-size: 0.85rem; outline: none; font-family: inherit;
}
.edit-popup input:focus, .edit-popup textarea:focus { border-color: var(--accent); }
.edit-popup textarea { resize: vertical; min-height: 60px; margin-bottom: 10px; }
.popup-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px; }
.popup-actions button { padding: 7px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.82rem; font-weight: 600; }
.btn-save   { background: #10b981; color: white; }
.btn-revert { background: #f59e0b; color: white; }
.btn-cancel { background: #e5e7eb; color: #374151; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 190; }
.edit-info { font-size: 0.8rem; color: var(--muted); margin-bottom: 12px; padding: 8px 10px; background: #f8fafc; border-radius: 6px; border-left: 3px solid var(--accent); }
.edit-info b { color: var(--text); }
.edit-warn { font-size: 0.78rem; color: #b45309; background: #fffbeb; border-radius: 4px; padding: 4px 8px; margin-top: 6px; display: none; }

#analysisPanel { margin: 0 24px 24px; background: white; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.1); padding: 20px 24px; display: none; }
#analysisPanel h2 { font-size: 1rem; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
.analysis-section { margin-bottom: 16px; }
.analysis-section h3 { font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; color: #374151; }
.change-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px; background: #f8fafc; border-radius: 6px; margin-bottom: 6px; border-left: 3px solid #3b82f6; flex-wrap: wrap; }
.change-item.issue { border-color: #ef4444; background: var(--issue); }
.change-item .ci-name  { font-weight: 700; min-width: 120px; font-size: 0.85rem; }
.change-item .ci-issue { color: #ef4444; font-size: 0.78rem; margin-top: 3px; width: 100%; }
.no-changes { color: var(--muted); font-style: italic; font-size: 0.85rem; }
.save-notice { position: fixed; bottom: 70px; right: 20px; background: #10b981; color: white; padding: 8px 16px; border-radius: 8px; font-size: 0.82rem; font-weight: 600; opacity: 0; transition: opacity .4s; pointer-events: none; z-index: 300; }
.save-notice.show { opacity: 1; }
.scroll-top-btn { position: fixed; bottom: 20px; right: 20px; width: 44px; height: 44px; border-radius: 50%; background: #2d3748; color: white; border: none; cursor: pointer; font-size: 1.2rem; box-shadow: 0 3px 10px rgba(0,0,0,.25); z-index: 300; display: flex; align-items: center; justify-content: center; transition: background .2s, transform .2s; }
.scroll-top-btn:hover { background: #3b82f6; transform: translateY(-2px); }
.pw-overlay { position: fixed; inset: 0; background: #1a202c; z-index: 999; display: flex; align-items: center; justify-content: center; }
.pw-box { background: white; border-radius: 12px; padding: 36px 40px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,.4); min-width: 300px; }
.pw-box h2 { font-size: 1.2rem; margin-bottom: 8px; color: #1a202c; }
.pw-box p { font-size: 0.85rem; color: #718096; margin-bottom: 20px; }
.pw-box input { width: 100%; padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem; outline: none; text-align: center; letter-spacing: 4px; }
.pw-box input:focus { border-color: #3b82f6; }
.pw-box button { margin-top: 14px; width: 100%; padding: 10px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 700; cursor: pointer; }
.pw-box button:hover { background: #2563eb; }
.pw-err { color: #ef4444; font-size: 0.8rem; margin-top: 8px; min-height: 18px; }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closePopup()"></div>
<div class="edit-popup" id="editPopup">
  <h3 id="popupTitle">Edit Related Item</h3>
  <div class="edit-info" id="popupInfo"></div>
  <label>Replace with (type to search):</label>
  <input type="text" id="popupTerm" list="termsList" placeholder="Term name..." oninput="checkWarn()">
  <datalist id="termsList"></datalist>
  <div class="edit-warn" id="editWarn"></div>
  <label style="margin-top:10px;">Reason:</label>
  <textarea id="popupReason" placeholder="Why does this connection make sense?"></textarea>
  <div class="popup-actions">
    <button class="btn-revert" onclick="revertChange()">Revert to original</button>
    <button class="btn-cancel" onclick="closePopup()">Cancel</button>
    <button class="btn-save" onclick="saveChange()">Save</button>
  </div>
</div>

<!-- Password gate -->
<div class="pw-overlay" id="pwOverlay">
  <div class="pw-box">
    <h2>Wikids RI Editor</h2>
    <p>Enter password to continue</p>
    <input type="password" id="pwInput" placeholder="&#9679;&#9679;&#9679;&#9679;" onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()">Enter</button>
    <div class="pw-err" id="pwErr"></div>
  </div>
</div>

<!-- Floating scroll-to-top -->
<button class="scroll-top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top">&#8679;</button>

<div class="save-notice" id="saveNotice">&#10003; Saved</div>

<div class="header" id="pageTop">
  <h1>Wikids RI Editor v2</h1>
  <span class="stats">238 entries &nbsp;|&nbsp; <strong id="changeCount">0</strong> changes</span>
  <button class="hbtn analyze" onclick="runAnalysis()">Analyze</button>
  <button class="hbtn export" onclick="exportPatch()">Export Patch JSON</button>
</div>

<div class="controls">
  <input type="text" id="searchBox" placeholder="Search entry..." oninput="filterRows()">
  <label>Category:
    <select id="catFilter" onchange="filterRows()">
      <option value="">All categories</option>
    </select>
  </label>
  <label><input type="checkbox" id="changedOnly" onchange="filterRows()"> Changed only</label>
  <label><input type="checkbox" id="issueOnly" onchange="filterRows()"> Issues only <span class="badge-count" id="issueCount">0</span></label>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div> same-category pick</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> manually changed</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> issue (mutual/loop)</div>
  <div class="legend-item"><span style="font-size:0.75rem;color:#9ca3af">click any RI cell to edit</span></div>
</div>

<div class="tbl-wrap">
<table id="mainTable">
  <thead><tr>
    <th>#</th><th>Entry</th><th>RI 1</th><th>RI 2</th><th>RI 3</th><th>RI 4</th>
  </tr></thead>
  <tbody id="tbody"></tbody>
</table>
</div>

<div id="analysisPanel">
  <h2>Change Analysis Report</h2>
  <div id="analysisContent"></div>
</div>

// ── State ────────────────────────────────────────────────────────────────────
// changes[name][slot] = { term, reason }
let changes = {};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) changes = JSON.parse(raw);
  } catch(e) { changes = {}; }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(changes));
  flashSaved();
}

function flashSaved() {
  const el = document.getElementById('saveNotice');
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 1800);
}

// ── Current picks (with overrides) ───────────────────────────────────────────
function currentPick(entry, slot) {
  return (changes[entry.name] && changes[entry.name][slot] !== undefined)
    ? changes[entry.name][slot].term
    : entry.picks[slot];
}
function currentReason(entry, slot) {
  return (changes[entry.name] && changes[entry.name][slot] !== undefined)
    ? changes[entry.name][slot].reason
    : entry.reasons[slot];
}
function isChanged(entry, slot) {
  return !!(changes[entry.name] && changes[entry.name][slot] !== undefined);
}
function filledCount(entry) {
  let n = 0;
  for (let i = 0; i < 4; i++) { if (currentPick(entry, i)) n++; }
  return n;
}

// ── Issue detection ──────────────────────────────────────────────────────────
function buildEdges() {
  const edges = {};
  ENTRIES.forEach(e => {
    edges[e.name] = [];
    for (let i = 0; i < 4; i++) {
      const p = currentPick(e, i);
      if (p) edges[e.name].push(p);
    }
  });
  return edges;
}

function nameToEntry(name) {
  return ENTRIES.find(e => e.name === name);
}

// Mutual: A->B and B->A. Flag only if at least one has < 4 filled RI.
function findMutuals(edges) {
  const pairs = new Set();
  const result = {};
  ENTRIES.forEach(e => {
    edges[e.name].forEach(b => {
      if (edges[b] && edges[b].includes(e.name)) {
        const key = [e.name, b].sort().join('||');
        if (!pairs.has(key)) {
          pairs.add(key);
          const entB = nameToEntry(b);
          const fcA = filledCount(e);
          const fcB = entB ? filledCount(entB) : 4;
          // Only flag if at least one has < 4 RI
          if (fcA < 4 || fcB < 4) {
            [e.name, b].forEach(n => {
              if (!result[n]) result[n] = [];
              result[n].push(`Mutual pair with ${n === e.name ? b : e.name} (${fcA < 4 ? e.name+' has '+fcA+' RI' : ''} ${fcB < 4 ? b+' has '+fcB+' RI' : ''})`);
            });
          }
        }
      }
    });
  });
  return result;
}

// 3-loops: A->B->C->A
function find3Loops(edges) {
  const seen = new Set();
  const result = {};
  ENTRIES.forEach(e => {
    edges[e.name].forEach(b => {
      if (!edges[b]) return;
      edges[b].forEach(c => {
        if (c === e.name || c === b) return;
        if (edges[c] && edges[c].includes(e.name)) {
          const key = [e.name, b, c].sort().join('||');
          if (!seen.has(key)) {
            seen.add(key);
            [e.name, b, c].forEach(n => {
              if (!result[n]) result[n] = [];
              result[n].push(`3-loop: ${e.name} \u2192 ${b} \u2192 ${c} \u2192 ${e.name}`);
            });
          }
        }
      });
    });
  });
  return result;
}

// 4-loops: A->B->C->D->A
function find4Loops(edges) {
  const seen = new Set();
  const result = {};
  ENTRIES.forEach(e => {
    edges[e.name].forEach(b => {
      if (!edges[b]) return;
      edges[b].forEach(c => {
        if (c === e.name || c === b) return;
        if (!edges[c]) return;
        edges[c].forEach(d => {
          if (d === e.name || d === b || d === c) return;
          if (edges[d] && edges[d].includes(e.name)) {
            const key = [e.name, b, c, d].sort().join('||');
            if (!seen.has(key)) {
              seen.add(key);
              [e.name, b, c, d].forEach(n => {
                if (!result[n]) result[n] = [];
                result[n].push(`4-loop: ${e.name} \u2192 ${b} \u2192 ${c} \u2192 ${d} \u2192 ${e.name}`);
              });
            }
          }
        });
      });
    });
  });
  return result;
}

let issueCache = {};
function computeIssues() {
  const edges = buildEdges();
  const m = findMutuals(edges);
  const t = find3Loops(edges);
  const q = find4Loops(edges);
  issueCache = {};
  ENTRIES.forEach(e => {
    const all = [
      ...(m[e.name] || []),
      ...(t[e.name] || []),
      ...(q[e.name] || [])
    ];
    if (all.length) issueCache[e.name] = all;
  });
  return issueCache;
}

  ALL_NAMES.forEach(n => {

  });

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  let issueTotal = 0;

  // Sort: mutual-pair entries go to the bottom, others keep original order
  const mutualNames = new Set();
  const edges = buildEdges();
  ENTRIES.forEach(e => {
    edges[e.name].forEach(b => {
      if (edges[b] && edges[b].includes(e.name)) {
        mutualNames.add(e.name);
        mutualNames.add(b);
      }
    });
  });
  const sorted = [
    ...ENTRIES.filter(e => !mutualNames.has(e.name)),
    ...ENTRIES.filter(e =>  mutualNames.has(e.name)),
  ];

  sorted.forEach(entry => {
    const hasIssue = !!issueCache[entry.name];
    const hasChange = Object.keys(changes[entry.name] || {}).length > 0;
    if (hasIssue) issueTotal++;

    const tr = document.createElement('tr');
    tr.className = 'entry-row' + (hasIssue ? ' has-issue' : '');
    tr.dataset.name = entry.name;
    tr.dataset.cat  = entry.category;
    tr.dataset.changed = hasChange ? '1' : '0';
    tr.dataset.issue   = hasIssue  ? '1' : '0';

    // ID cell
    let html = `<td class="entry-id">${entry.id}</td>`;

    // Name cell
    const cc = catColor(entry.category);
    html += `<td><div class="entry-name">${escHtml(entry.name)}</div>`;
    html += `<span class="cat-chip" style="background:${cc}">${escHtml(entry.category)}</span>`;
    if (hasIssue) {
      html += `<div style="font-size:0.7rem;color:#ef4444;margin-top:3px;">&#9888; ${issueCache[entry.name].length} issue(s)</div>`;
    }
    html += '</td>';

    // 4 RI cells
    for (let slot = 0; slot < 4; slot++) {
      const pick = currentPick(entry, slot);
      const reason = currentReason(entry, slot);
      const origPick = entry.picks[slot];
      const changed = isChanged(entry, slot);
      const pickCat = pick ? (issueCache[entry.name] ? '' : '') : '';
      const pcat = pick ? (ENTRIES.find(e => e.name === pick) || {}).category || '' : '';
      const isSameCat = pick && pcat === entry.category;
      const isIssue = hasIssue; // highlight all cells if entry has any issue

      let cellClass = 'ri-cell';
      if (!pick) cellClass += ' empty-slot';
      if (changed) cellClass += ' is-changed';

      html += `<td class="${cellClass}" onclick="${pick || true ? `openPopup(${entry.id},${slot})` : ''}">`;
      html += '<div class="ri-inner">';
      if (pick) {
        const pColor = catColor(pcat);
        html += `<span class="ri-term" style="background:${pColor}">${escHtml(pick)}`;
        if (isSameCat) html += `<span class="same-cat-dot" title="same category"></span>`;
        html += '</span>';
        if (changed && origPick !== pick) {
          html += `<div class="orig-term">${escHtml(origPick || '(empty)')}</div>`;
        }
        if (reason) html += `<div class="ri-reason">${escHtml(reason)}</div>`;
      } else {
        html += `<span class="ri-term empty">(empty)</span>`;
      }
      html += '</div></td>';
    }

    tr.innerHTML = html;
    tbody.appendChild(tr);
  });

  document.getElementById('issueCount').textContent = issueTotal;
  updateChangeCount();
  filterRows();
}

function updateChangeCount() {
  let n = 0;
  Object.values(changes).forEach(slots => { n += Object.keys(slots).length; });
  document.getElementById('changeCount').textContent = n;
}

// ── Filtering ────────────────────────────────────────────────────────────────
function filterRows() {
  const q       = document.getElementById('searchBox').value.toLowerCase();
  const cat     = document.getElementById('catFilter').value;
  const chOnly  = document.getElementById('changedOnly').checked;
  const isOnly  = document.getElementById('issueOnly').checked;
  document.querySelectorAll('.entry-row').forEach(tr => {
    const nm = tr.dataset.name.toLowerCase();
    const ct = tr.dataset.cat;
    const ok = (!q || nm.includes(q))
            && (!cat || ct === cat)
            && (!chOnly || tr.dataset.changed === '1')
            && (!isOnly || tr.dataset.issue === '1');
    tr.classList.toggle('hidden', !ok);
  });
}

// ── Popup ────────────────────────────────────────────────────────────────────
let popupEntry = null, popupSlot = -1;

function openPopup(entryId, slot) {
  popupEntry = ENTRIES.find(e => e.id === entryId);
  popupSlot  = slot;
  const pick   = currentPick(popupEntry, slot);
  const reason = currentReason(popupEntry, slot);

  document.getElementById('popupTitle').textContent =
    `Edit RI ${slot+1} of "${popupEntry.name}"`;
  document.getElementById('popupInfo').innerHTML =
    `<b>${escHtml(popupEntry.name)}</b> (${escHtml(popupEntry.category)}) — slot ${slot+1}<br>` +
    `Current: <b>${escHtml(pick || '(empty)')}</b>` +
    (popupEntry.picks[slot] && popupEntry.picks[slot] !== pick
      ? ` &nbsp;<span style="color:#9ca3af;text-decoration:line-through">${escHtml(popupEntry.picks[slot])}</span>` : '');

  document.getElementById('popupTerm').value   = pick || '';
  document.getElementById('popupReason').value = reason || '';
  document.getElementById('editWarn').style.display = 'none';
  document.getElementById('overlay').style.display  = 'block';
  document.getElementById('editPopup').style.display = 'block';
  document.getElementById('popupTerm').focus();
}

function closePopup() {
  document.getElementById('overlay').style.display  = 'none';
  document.getElementById('editPopup').style.display = 'none';
  popupEntry = null; popupSlot = -1;
}

function checkWarn() {
  const val  = document.getElementById('popupTerm').value.trim();
  const warn = document.getElementById('editWarn');
  if (!val) { warn.style.display = 'none'; return; }
  const exists = ALL_NAMES.includes(val);
  if (!exists) {
    warn.textContent = `"${val}" is not in the entries list — make sure the name matches exactly.`;
    warn.style.display = 'block';
  } else {
    warn.style.display = 'none';
  }
}

function saveChange() {
  const newTerm   = document.getElementById('popupTerm').value.trim();
  const newReason = document.getElementById('popupReason').value.trim();
  const name = popupEntry.name;

  if (!changes[name]) changes[name] = {};

  if (newTerm === '' || newTerm === (popupEntry.picks[popupSlot] || '')) {
    // Reverting to original — remove override
    delete changes[name][popupSlot];
    if (Object.keys(changes[name]).length === 0) delete changes[name];
  } else {
    changes[name][popupSlot] = { term: newTerm, reason: newReason };
  }

  saveState();
  closePopup();
  renderTable();
}

function revertChange() {
  const name = popupEntry.name;
  if (changes[name]) {
    delete changes[name][popupSlot];
    if (Object.keys(changes[name]).length === 0) delete changes[name];
  }
  saveState();
  closePopup();
  renderTable();
}

// ── Analysis panel ───────────────────────────────────────────────────────────
function runAnalysis() {
  const panel = document.getElementById('analysisPanel');
  const content = document.getElementById('analysisContent');
  panel.style.display = 'block';

  // Changed entries
  let changesHtml = '';
  ENTRIES.forEach(entry => {
    const slots = changes[entry.name];
    if (!slots) return;
    Object.entries(slots).forEach(([slot, ch]) => {
      slot = parseInt(slot);
      const orig = entry.picks[slot] || '(empty)';
      const issues = (issueCache[entry.name] || []);
      const cc = catColor(entry.category);
      const isIssue = !!issueCache[entry.name];
      changesHtml += `<div class="change-item${isIssue ? ' issue' : ''}">`;
      changesHtml += `<span class="ci-name" style="color:${cc}">${escHtml(entry.name)}</span>`;
      changesHtml += ` RI${slot+1}: <span style="text-decoration:line-through;color:#9ca3af">${escHtml(orig)}</span>`;
      changesHtml += ` &rarr; <b style="color:#10b981">${escHtml(ch.term)}</b>`;
      if (ch.reason) changesHtml += `<div style="font-size:0.75rem;color:#6b7280;margin-top:2px;font-style:italic">"${escHtml(ch.reason)}"</div>`;
      if (isIssue) {
        issues.forEach(iss => {
          changesHtml += `<div class="ci-issue">&#9888; ${escHtml(iss)}</div>`;
        });
      }
      changesHtml += '</div>';
    });
  });

  // Issues summary
  let issuesHtml = '';
  Object.entries(issueCache).forEach(([name, issues]) => {
    const entry = ENTRIES.find(e => e.name === name);
    const cc = catColor(entry ? entry.category : '');
    issuesHtml += `<div class="change-item issue">`;
    issuesHtml += `<span class="ci-name" style="color:${cc}">${escHtml(name)}</span>`;
    issues.forEach(iss => { issuesHtml += `<div class="ci-issue">&#9888; ${escHtml(iss)}</div>`; });
    issuesHtml += '</div>';
  });

  let html = `<div class="analysis-section"><h3>Changes (${Object.values(changes).reduce((a,v)=>a+Object.keys(v).length,0)})</h3>`;
  html += changesHtml || `<p class="no-changes">No changes yet.</p>`;
  html += '</div>';
  html += `<div class="analysis-section"><h3>Issues (${Object.keys(issueCache).length} entries)</h3>`;
  html += issuesHtml || `<p class="no-changes">No issues detected.</p>`;
  html += '</div>';

  html += `<div style="margin-top:16px;padding:12px;background:#f0fdf4;border-radius:8px;border:1px solid #bbf7d0">`;
  html += `<strong style="color:#166534;font-size:0.85rem;">Ready to export?</strong> `;
  html += `<span style="color:#166534;font-size:0.82rem;">Click <em>Export Patch JSON</em> in the header.</span>`;
  html += '</div>';

  content.innerHTML = html;
  panel.scrollIntoView({ behavior: 'smooth' });
}

// ── Export ───────────────────────────────────────────────────────────────────
function exportPatch() {
  const out = { generated: new Date().toISOString(), source: '4-RI-2026-07-02.csv', changes: [] };
  ENTRIES.forEach(entry => {
    const slots = changes[entry.name];
    if (!slots) return;
    Object.entries(slots).forEach(([slot, ch]) => {
      slot = parseInt(slot);
      out.changes.push({
        entry_id: entry.id,
        name: entry.name,
        category: entry.category,
        slot,
        original_term: entry.picks[slot] || '',
        new_term: ch.term,
        reason: ch.reason || ''
      });
    });
  });
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'manual_patch_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

// ── Password gate ─────────────────────────────────────────────────────────────
function checkPw() {
  const val = document.getElementById('pwInput').value;
  if (val === 'ijea') {
    sessionStorage.setItem('ri_auth', '1');
    document.getElementById('pwOverlay').style.display = 'none';
  } else {
    document.getElementById('pwErr').textContent = 'Incorrect password.';
    document.getElementById('pwInput').value = '';
  }
}

// ── Init ─────────────────────────────────────────────────────────────────────
if (sessionStorage.getItem('ri_auth') === '1') {
  document.getElementById('pwOverlay').style.display = 'none';
}
loadState();
renderTable();
</script>
